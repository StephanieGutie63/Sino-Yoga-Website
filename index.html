<title>Sino Yoga Newsletter</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

```         
  <div class="newsletter">
     <div class="icon-header">
          <div class="icon-circle">✉</div>
          <div class="icon-text">
            <h2> Sign up for our Monthly Newseltter</h2>
            <p> Get wellness tips, exclusive content, video updates, and special offers.</p>
          </div>
      </div>
    <form id="newsletterform">
        <label>Full Name<span class="required">*</span></label>
        <input name="fullName" type="text" placeholder="Enter your Full Name" required>
        <br>
        <label>Email<span class="required">*</span></label>
        <input name ="email" type="email" placeholder="Enter your Email" required>

        <div class="form-row">
            <div>
                <label>Preferred Language<span class="required">*</span></label>
                <select name="language" required>
                    <option value="">Select language</option>
                    <option>English</option>
                    <option>Chinese</option>
                </select>
            </div>
            <div>
                <label>Age<span class="required">*</span></label>
                <select name="age" required>
                    <option value="">Select age range</option>
                    <option>Under 18</option>
                    <option>18-24</option>
                    <option>25-34</option>
                    <option>35-44</option>
                    <option>45+</option>
                </select>
             </div>
          </div>
      <div class="form-row">
      <div>
        <label>Gender<span class="required">*</span></label>
        <select name="gender" required>
            <option value="">Select gender</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
            <option>Prefer not to say</option>
        </select>
      </div>
        <div>
        <label>Yoga Experience<span class="required">*</span></label>
        <select name="experience" required>
          <option value="">Select your level</option>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>
        <div class="membership-field">
         <label>Are you interested in our YouTube Membership?<span class="required">*</span></label>
            <select name="membership" required>
             <option value="">Membership</option>
             <option value="yes">Yes</option>
             <option value="no">No</option>
             <option value="maybe">Maybe</option>
            </select>
    </div> 
</div>
   <button type="submit">Subscribe Now</button>

    <p class="privacy">🔒 We respect your privacy. Unsubscribe at any time.</p>  
    <p id="formMessage"></p>

      </form>
  </div>

```

```{=html}
<script src="script.js"></script>
```

</body>

</html>
